  #              cli_flavor: dreamina   # dreamina(官方) | jimeng(npm社区版)
  #              cli_command: dreamina   # 留空则按 cli_flavor 自动选择
  #              model: 4.5              # dreamina 用 model_version；也兼容 jimeng-4.5
  #              ratio: "9:16"
