# 图片生成
imagegen:
  # backend: dashscope  # diffusers | together | siliconflow | dashscope | jimeng-cli
  # model: qwen-image
  # size: "928*1664"   # 9:16 竖屏（qwen-image 推荐）
  # request_interval: 5  # 每张图间隔秒数，避免 429 限流；仍频繁 429 可调到 8-10
  # prompt_extend: false  # 敏感题材务必 false，扩写易触发内容审核
  # negative_prompt: "nsfw, nude, violence, gore, blood, explicit sexual content"
  # width: 1024
  # height: 1792
  backend: jimeng-cli
  cli_flavor: dreamina      # 官方 CLI（默认）
  cli_command: dreamina     # 可省略，会自动选
  model: "4.5"              # 务必加引号，否则 YAML 会解析为浮点数
  ratio: "16:9"    # 标准横屏，最常用
  # ratio: "21:9"  # 超宽屏
  # ratio: "3:2"   # 摄影横构图
  # ratio: "4:3"   # 略宽
  resolution: 2k
  timeout: 300
  prompt_max_chars: 1200  # 即梦 API 超长易报 ret=1046 InvalidNode
  negative_prompt: "photorealistic, realistic, photo, photograph, live action, hyperrealistic, 3d render, cgi, deformed, blurry, watermark, text, dark, gloomy, oppressive, horror, scary, blood, gore"
